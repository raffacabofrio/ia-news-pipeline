# ElasticMQ config (architecture D2).
# Main queue + DLQ wired by redrive policy; maxReceiveCount = 5 is a frozen decision.
# Queue names are the project-wide defaults (QUEUE_NAME=pipeline-jobs from S0.2 on).
include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
}

queues {
  pipeline-jobs {
    deadLettersQueue {
      name = "pipeline-jobs-dlq"
      maxReceiveCount = 5
    }
  }
  pipeline-jobs-dlq { }
}
